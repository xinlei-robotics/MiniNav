name: 🐛 Bug
description: "A defect: incorrect behavior, crash, or regression"
title: "[Bug] "
labels: ["type: bug"]
body:
  - type: markdown
    attributes:
      value: |
        Use this template when something works incorrectly. For known
        limitations that we *consciously* deferred, use the
        "Tech debt" template instead.

  - type: textarea
    id: description
    attributes:
      label: What went wrong
      description: One-paragraph summary of the broken behavior
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: How to reproduce
      placeholder: |
        1. `cmake --preset clang18-debug`
        2. `cmake --build --preset build-debug -j`
        3. `./build/clang18-debug/sim_v1 --seed 42`
        4. Observe ...
    validations:
      required: true

  - type: input
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: input
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        - OS: WSL Ubuntu 24.04
        - Compiler: Clang 18
        - CMake: 3.28
        - Build preset: clang18-debug
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs / output
      description: Paste relevant stdout, stderr, or test failure output
      render: shell
    validations:
      required: false
